<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>engineering@eleven — Workshop Curriculum</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&family=Fira+Code:wght@400;500&display=swap');

:root {
  --bg:        #f0ede8;
  --surface:   #faf9f7;
  --card:      #ffffff;
  --border:    #e5dfd7;
  --shadow:    rgba(60,40,20,0.07);
  --shadow-lg: rgba(60,40,20,0.14);
  --text:      #2d2620;
  --muted:     #8c7e72;
  --dim:       #c0b0a4;
  --radius: 18px;
  --radius-sm: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-weight: 400;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  max-width: 1240px;
  margin: 0 auto;
  padding: 1.4rem 2rem .8rem;
}

.brand {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: .8rem;
  opacity: 0;
  animation: fadeUp .5s ease forwards;
}

.brand-logo {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fira Code', monospace;
  font-size: .62rem;
  font-weight: 500;
  color: white;
  box-shadow: 0 4px 14px rgba(255,107,53,.35);
  flex-shrink: 0;
}

.brand-wordmark {
  font-family: 'Fira Code', monospace;
  font-size: 1rem;
  font-weight: 400;
  color: var(--muted);
}
.brand-wordmark strong { color: var(--text); font-weight: 700; }

h1 {
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 900;
  line-height: 1.08;
  letter-spacing: -.035em;
  color: var(--text);
  margin-bottom: .4rem;
  opacity: 0;
  animation: fadeUp .5s ease forwards .1s;
}

h1 em {
  font-style: normal;
  background: linear-gradient(100deg, #ff6b35 20%, #f7931e 80%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  font-size: .82rem;
  color: var(--muted);
  max-width: 520px;
  line-height: 1.5;
  opacity: 0;
  animation: fadeUp .5s ease forwards .2s;
}

/* ── CONTROLS ── */
.controls {
  max-width: 1240px;
  margin: 0 auto;
  padding: .6rem 2rem .8rem;
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
  align-items: center;
  opacity: 0;
  animation: fadeUp .5s ease forwards .3s;
}

.pill {
  font-family: 'Nunito', sans-serif;
  font-size: .72rem;
  font-weight: 800;
  padding: .28rem .8rem;
  border-radius: 100px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--muted);
  cursor: pointer;
  transition: all .18s ease;
  box-shadow: 0 2px 6px var(--shadow);
}
.pill:hover { border-color: #bbb0a4; color: var(--text); transform: translateY(-1px); }
.pill.active { background: var(--text); border-color: var(--text); color: white; box-shadow: 0 4px 14px var(--shadow-lg); }
.pill.active.hot-pill { background: linear-gradient(135deg,#ff6b35,#e8334a); border-color: transparent; }
.pill.active.rec-pill { background: linear-gradient(135deg,#2a9d8f,#06d6a0); border-color: transparent; }

.c-divider { width: 1.5px; background: var(--border); align-self: stretch; margin: .15rem 0; }

/* ── GRID ── */
.grid {
  margin: 0 auto;
  padding: 0 2rem 2rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: .6rem;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border-radius: 12px;
  border: 2px solid var(--border);
  padding: .85rem 1rem .75rem;
  cursor: grab;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, opacity .18s;
  box-shadow: 0 2px 10px var(--shadow);
  position: relative;
  user-select: none;
}

.card-init {
  animation: fadeUp .42s ease forwards;
}

.card:hover {
  box-shadow: 0 10px 30px var(--shadow-lg);
  transform: translateY(-3px);
}

.card.dragging {
  cursor: grabbing;
  opacity: .35;
  box-shadow: 0 22px 55px var(--shadow-lg);
  z-index: 100;
}

.card.drag-over-before {
  box-shadow: -4px 0 0 0 #ff6b35, 0 10px 30px var(--shadow-lg);
  transform: translateY(-2px);
}

.card.drag-over-after {
  box-shadow: 4px 0 0 0 #ff6b35, 0 10px 30px var(--shadow-lg);
  transform: translateY(-2px);
}

/* ── TOP ROW ── */
.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: .8rem;
  margin-bottom: .5rem;
}

.card-tag {
  font-family: 'Fira Code', monospace;
  font-size: .6rem;
  font-weight: 500;
  padding: .22rem .65rem;
  border-radius: 100px;
  background: var(--tag-bg, #f0ede8);
  color: var(--tag-color, var(--muted));
  white-space: nowrap;
  flex-shrink: 0;
  border: 1.5px solid color-mix(in srgb, var(--tag-color, #aaa) 20%, transparent);
}

.card-num { font-family: 'Fira Code', monospace; font-size: .55rem; color: var(--dim); margin-bottom: .1rem; }
.card-title { font-size: .88rem; font-weight: 800; line-height: 1.2; color: var(--text); letter-spacing: -.02em; }

/* ── BADGES ── */
.card-badges { display: flex; gap: .3rem; flex-wrap: wrap; margin-bottom: .45rem; }
.badge { font-size: .6rem; font-weight: 700; padding: .12rem .45rem; border-radius: 100px; }
.badge-hot { background: #fff0ed; color: #e85d3a; }
.badge-rec { background: #edf7f6; color: #2a9d8f; }

/* ── DESC ── */
.card-desc { font-size: .78rem; color: var(--muted); line-height: 1.5; margin-bottom: .5rem; }

/* ── TOPICS ── */
.topics { display: none; margin-bottom: .85rem; padding-top: .6rem; border-top: 1.5px solid var(--border); }
.card.expanded .topics { display: block; }
.topics ul { list-style: none; display: flex; flex-direction: column; gap: .28rem; }
.topics li {
  font-family: 'Fira Code', monospace;
  font-size: .62rem;
  color: var(--muted);
  padding-left: 1.1rem;
  position: relative;
  line-height: 1.5;
}
.topics li::before {
  content: '›';
  position: absolute;
  left: 0;
  color: var(--tag-color, var(--muted));
  font-weight: 700;
}

/* ── FOOTER ROW ── */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: .5rem;
  border-top: 1.5px solid var(--border);
  gap: .5rem;
}

/* ── VOTE ── */
.vote-wrap { display: flex; align-items: center; gap: .45rem; }

.vote-btn {
  font-family: 'Nunito', sans-serif;
  font-size: .7rem;
  font-weight: 800;
  padding: .2rem .6rem;
  border-radius: 100px;
  border: 2px solid var(--border);
  background: white;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s ease;
  display: flex; align-items: center; gap: .3rem;
}
.vote-btn:hover:not(:disabled) { border-color: #ff6b35; color: #ff6b35; background: #fff4f1; }
.vote-btn:disabled { cursor: default; opacity: .55; }
.vote-btn.voted {
  background: linear-gradient(135deg, #ff6b35, #f7931e);
  border-color: transparent;
  color: white;
  box-shadow: 0 3px 10px rgba(255,107,53,.3);
}

.vote-count {
  text-align: center;
  font-family: 'Fira Code', monospace;
  font-size: .7rem;
  font-weight: 500;
  color: var(--muted);
  min-width: 1.2rem;
}

/* ── EXPAND BTN ── */
.expand-btn {
  font-size: .68rem;
  font-weight: 800;
  color: var(--dim);
  background: none;
  border: none;
  cursor: pointer;
  padding: .2rem .4rem;
  border-radius: var(--radius-sm);
  transition: all .15s;
}
.expand-btn:hover { background: var(--bg); color: var(--text); }
.card.expanded .expand-btn { color: var(--tag-color, var(--muted)); }

/* ── DRAG GRIP ── */
.drag-grip {
  position: absolute;
  top: .6rem; right: .65rem;
  color: var(--dim);
  font-size: .75rem;
  opacity: 0;
  transition: opacity .15s;
  pointer-events: none;
  line-height: 1;
}
.card:hover .drag-grip { opacity: .6; }

/* ── EMPTY ── */
.empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--dim); font-size: .95rem; }

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 1rem 2rem;
  font-size: .75rem;
  color: var(--dim);
  font-family: 'Fira Code', monospace;
  border-top: 1.5px solid var(--border);
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes votePop {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.25); }
  100% { transform: scale(1); }
}
.vote-btn.pop { animation: votePop .28s cubic-bezier(.34,1.56,.64,1); }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .grid { grid-template-columns: 1fr; padding: 0 1rem 4rem; }
  header { padding: 2rem 1rem 1.5rem; }
  .controls { padding: .8rem 1rem 1.2rem; }
}
</style>
</head>

  catch { return {}; }
}
function saveMyVotes(mv) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(mv)); }
  catch {}
}
let myVotes = loadMyVotes(); // e.g. { s01: true, s13: true }

// ── JSONBIN: LOAD ───────────────────────────────────────────────────────────
async function loadVotes() {
  if (JSONBIN_BIN_ID === 'YOUR_BIN_ID_HERE') return; // not configured yet
  try {
    const res = await fetch(JSONBIN_URL + '/latest', {
      headers: { 'X-Master-Key': JSONBIN_API_KEY }
    });
    if (!res.ok) return;
    const data = await res.json();
    const saved = data.record?.votes;
    if (saved) {
      // merge saved votes into local state (ignore unknown ids)
      Object.keys(saved).forEach(id => {
        if (id in votes) votes[id] = saved[id];
      });
      refreshAllVoteDisplays();
    }
  } catch(e) { console.warn('Could not load votes:', e); }
}

// ── JSONBIN: SAVE (debounced 800ms) ─────────────────────────────────────────
function saveVotes() {
  if (JSONBIN_BIN_ID === 'YOUR_BIN_ID_HERE') return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await fetch(JSONBIN_URL, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY
        },
        body: JSON.stringify({ votes })
      });
    } catch(e) { console.warn('Could not save votes:', e); }
  }, 800);
}

// ── UPDATE VOTE DISPLAY ON ALL RENDERED CARDS ───────────────────────────────
function refreshAllVoteDisplays() {
  document.querySelectorAll('.card').forEach(card => {
    const id      = card.dataset.id;
    const count   = votes[id] ?? 0;
    const hasVoted = !!myVotes[id];
    const countEl = card.querySelector('.vote-count');
    const btn     = card.querySelector('.vote-btn');
    const undo    = card.querySelector('.vote-undo');
    if (countEl) countEl.textContent = count;
    if (btn) {
      btn.classList.toggle('voted', hasVoted);
      btn.disabled = hasVoted;
      btn.title = hasVoted ? 'You already voted for this one' : '';
    }
    if (undo) undo.style.display = hasVoted ? 'inline-flex' : 'none';
  });
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function getVisible() {
  if (filter === 'all') return [...order];
  if (filter === 'hot') return order.filter(id => SESSIONS.find(s=>s.id===id).hot);
  if (filter === 'rec') return order.filter(id => SESSIONS.find(s=>s.id===id).rec);
  return order.filter(id => SESSIONS.find(s=>s.id===id).cat === filter);
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const visible = getVisible();

  if (!visible.length) {
    grid.innerHTML = '<div class="empty">No sessions match this filter.</div>';
    return;
  }

  visible.forEach((id, i) => {
    const s  = SESSIONS.find(x => x.id === id);
    const cm = CAT[s.cat];
    const isExp   = expanded.has(id);

    const card = document.createElement('div');
    card.className = 'card' + (isExp ? ' expanded' : '');
    card.dataset.id = id;
    card.draggable = true;
    card.classList.add('card-init');
    card.style.animationDelay = `${Math.min(i * 0.038, 0.6)}s`;
    card.style.setProperty('--tag-color', cm.color);
    card.style.setProperty('--tag-bg',    cm.bg);

    const badgesHtml = [
      s.hot ? '<span class="badge badge-hot">🔥 popular</span>' : '',
      s.rec ? '<span class="badge badge-rec">★ first</span>'    : '',
    ].filter(Boolean).join('');

    card.innerHTML = `
      <div class="drag-grip">⠿</div>
      <div class="card-top">
        <div>
          <div class="card-num">#${s.num}</div>
          <div class="card-title">${s.title}</div>
        </div>
        <span class="card-tag">${cm.label}</span>
      </div>
      ${badgesHtml ? `<div class="card-badges">${badgesHtml}</div>` : ''}
      <p class="card-desc">${s.desc}</p>
      <div class="topics"><ul>${s.topics.map(t=>`<li>${t}</li>`).join('')}</ul></div>
      <div class="card-footer">
        <div class="vote-wrap">
          <button class="vote-btn${myVotes[id]?' voted':''}" data-action="vote" ${myVotes[id]?'disabled title="You already voted for this one"':''}>▲ vote</button>
          <span class="vote-count">${votes[id]}</span>
          <button class="vote-undo" data-action="unvote" style="display:${myVotes[id]?'inline-flex':'none'}">−</button>
        </div>
        <button class="expand-btn" data-action="expand">
          ${isExp ? '▲ less' : '▼ more'}
        </button>
      </div>
    `;

    // ── EVENTS ──
    card.addEventListener('click', e => {
      const action = e.target.closest('[data-action]')?.dataset.action;
      if (!action) return;

      if (action === 'expand') {
        isExp ? expanded.delete(id) : expanded.add(id);
        card.classList.toggle('expanded');
        e.target.textContent = card.classList.contains('expanded') ? '▲ less' : '▼ more';
        if (card.classList.contains('expanded')) expanded.add(id);
        else expanded.delete(id);
      }

      if (action === 'vote') {
        if (myVotes[id]) return; // already voted on this topic
        votes[id]++;
        myVotes[id] = true;
        saveMyVotes(myVotes);
        const btn = card.querySelector('.vote-btn');
        btn.classList.add('voted');
        btn.disabled = true;
        btn.title = 'You already voted for this one';
        btn.classList.add('pop');
        btn.addEventListener('animationend', () => btn.classList.remove('pop'), {once:true});
        card.querySelector('.vote-count').textContent = votes[id];
        card.querySelector('.vote-undo').style.display = 'inline-flex';
        saveVotes();
      }

      if (action === 'unvote') {
        if (myVotes[id] && votes[id] > 0) {
          votes[id]--;
          delete myVotes[id];
          saveMyVotes(myVotes);
          const btn = card.querySelector('.vote-btn');
          btn.classList.remove('voted');
          btn.disabled = false;
          btn.title = '';
          card.querySelector('.vote-count').textContent = votes[id];
          card.querySelector('.vote-undo').style.display = 'none';
          saveVotes();
        }
      }
    });

    // ── DRAG ──
    card.addEventListener('dragstart', e => {
      dragSrc = card;
      setTimeout(() => card.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', id);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      grid.querySelectorAll('.card').forEach(c => {
        c.classList.remove('drag-over-before', 'drag-over-after');
      });
      dragSrc = null;
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (!dragSrc || dragSrc === card) return;
      grid.querySelectorAll('.card').forEach(c => {
        c.classList.remove('drag-over-before', 'drag-over-after');
      });
      const rect = card.getBoundingClientRect();
      const midX = rect.left + rect.width / 2;
      if (e.clientX < midX) {
        card.classList.add('drag-over-before');
      } else {
        card.classList.add('drag-over-after');
      }
    });
    card.addEventListener('dragleave', e => {
      // only clear if truly leaving the card (not entering a child)
      if (!card.contains(e.relatedTarget)) {
        card.classList.remove('drag-over-before', 'drag-over-after');
      }
    });
    card.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === card) return;
      const isBefore = card.classList.contains('drag-over-before');
      card.classList.remove('drag-over-before', 'drag-over-after');

      // Move DOM node directly — no re-render
      if (isBefore) {
        grid.insertBefore(dragSrc, card);
      } else {
        grid.insertBefore(dragSrc, card.nextSibling);
      }

      // Sync order array from DOM
      order = Array.from(grid.querySelectorAll('.card')).map(c => c.dataset.id);
    });

    grid.appendChild(card);
  });
}

// ── FILTER BAR ─────────────────────────────────────────────────────────────
document.getElementById('controls').addEventListener('click', e => {
  if (!e.target.matches('.pill')) return;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  filter = e.target.dataset.filter;
  renderAll();
  refreshAllVoteDisplays();
});

renderAll();
loadVotes().then(refreshAllVoteDisplays);
</script>
</body>
</html>
